name: Build and Deploy
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
env:
  REGISTRY: dflouis
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Detect changed services
      uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          auth:
            - 'AuthService/**'
            - 'Dockerfile.auth-service'

  build-and-push:
    runs-on: ubuntu-latest
    needs: detect-changes

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 23
      if: needs.detect-changes.outputs.auth == 'true'
      uses: actions/setup-java@v3
      with:
        java-version: '23'
        distribution: 'temurin'

    - name: Build Auth Service
      if: needs.detect-changes.outputs.auth == 'true'
      working-directory: ./AuthService
      run: |
        chmod +x gradlew
        ./gradlew build -x test

    - name: Build and Push Auth
      if: needs.detect-changes.outputs.auth == 'true'
      run: |
        docker build -f Dockerfile.auth-service -t ${{ env.REGISTRY }}/dedicate-auth-service:latest .
        docker push ${{ env.REGISTRY }}/dedicate-auth-service:latest